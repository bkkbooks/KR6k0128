body:
  text: 説戒正儀篇第十布薩此云淨住出要律儀云是憍薩羅國語六卷泥洹云布薩者長養二義一清淨戒住二增長功德雜含云布薩陀婆若正本音優補陀婆優言斷補陀婆言增長國語不同亦呼為集為知為宜為同為共住為轉為常也三千威儀云布薩者秦言淨住義言長養又言和合也俱舍論名八戒云布薩護也明了言在心名護在身口名戒也律云布薩法一處名布薩犍度即説戒也説戒儀軌佛法大綱攝持正像匡維衆法然凡情易滿見無深重希作欽貴數為賤薄比雖行此法多生慢怠良由日染屢聞便隨心輕昧以此論情情可知矣昔齊文宣王撰在家布薩儀普照沙門道安開士撰出家布薩法並行於世但意解不同心相各別直得承用文據莫憑今求以經意參以所聞粗重撰次備如後列然生居像末法就澆漓若不共相敦遇終無成辨之益故先引勸勉後便文證善見云云何得知正法久住若説戒法不壞是摩得伽云布薩者捨諸惡不善法及諸煩惱有受證得白法究竟梵行事故名也又云半月半月自觀身從前半月至今半月中間不犯戒耶若有犯者於同意所懺悔毗尼母清淨者名布薩義就中分二初僧後別初中分四一時節不同二雜法衆具三正説儀軌四略説雜法初中五種一十四十五十六三日不同二食前食後三若晝若夜四若增若減五時與非時前三出十誦文四分中三日説戒如上列也又云布薩日應説五分云八日十四日説法十五日布薩僧祇食前亦得而不得晨起布薩得罪以後來比丘不聞故四分為外界鬪諍比丘來佛令增減説戒若知於十四日來十三日前説若十五日來十四日説若已入界當令入浴界內比丘出界而説若不得者白僧言今不得説後十五日當説又不去者更增至十五日若不去強和合説但明二度不云三度至三必須同説亦無三度不説法滅之文偽傳於久律云拘睒彌國六年不説佛尚在世何妨一國鬪諍不得安樂不階聖果名為法滅律中阿難疑高勝比丘犯盜經六布薩不與同法僧祇相嫌二十年不説戒等四分鬪諍來久不得説戒今暫和合須非時説隨何日諍滅即日和説以僧具六和戒見利身口意等今不同見戒則無僧義不成和合清淨僧法故二明雜法衆具五分布薩時不時集妨行道佛令作時節如前集僧中十誦云行籌者為檀越問僧不知數佛令行籌不知沙彌數行籌數之若人施布薩物沙彌亦得雖不往布薩羯磨處由受籌故四分為受供行籌通沙彌也若未受十戒亦得受籌以同受供故如涅槃中雖未受十戒已墮僧數若請僧次理無別他五分籌極短並五指極長拳一肘極麁不過小指極細不得減箸有客來不知行籌收取數之一人行一人收乃至收已數之知數已唱言比丘若干沙彌若干出家人和合若干人四分云聽行舍羅此云籌也五分若白衣以華散高座比丘佛開之比丘不得若白衣散華墮比丘身衣上當拂去落高座上無苦比丘欲莊嚴説戒堂懸繒散華佛皆聽之僧祇若欲誦時當先淨洗手已捉籌若有香汁浴之亦得餘人欲捉籌者亦復如是誦毗尼時雜碎文句數難持聽作籌數之一者五百二者七百以通僧尼戒本若布薩日掃塔僧院使人泥治香汁灑地散華香然燈火誰應呪願誦戒行籌並預辨之四分云年少比丘應具水瓶燈火等具上座應處分僧祇云若誦戒時應誦二部律無者應誦一部若上座次座應誦無者乃至能誦者誦為未受具人説五篇名得罪準四分得語一切犯者得突吉羅若説時不得覆頭覆肩應脫革屣偏袒右肩行籌其受籌者亦爾先行受具人籌後行沙彌籌已唱法如五分五分云上座應説戒持律作羯磨説戒座上眠睡反抄衣叉腰著革屣或臥或倚不恭敬等並得小罪若上座説戒忘應授猶忘再授更忘應差人續次誦之不得重誦若諸緣事起者明日布薩諸羯磨法並在説戒前作以是攝僧法故應直説戒不得歌詠聲至八日十四日説法時白衣聞法歡喜布施者受之令維那呪願十五日布薩時尼來請教誡乃至上座告云莫放逸等如後所説四分開歌詠聲誦戒此是五分廢教十誦云知布薩法者盡應供養不者得罪以無佛時是人補處故説戒人先當暗誦令利莫僧中説時錯謬三正明説儀此門布置據律不具今行事者通取諸部共成一法而諸家安設各有不同今取普照道安二師為本餘則引律誠文刪補取中十種一前須處所中國布薩有説戒堂至時便赴此無別所多在講食兩堂理須準承通皆席地中國有用繩床類多以草布地所以有尼師壇者皆為舒於草上此間古者有床大夫已上時復施安降斯已下亦皆席地東晉之後床事始盛今寺所設率多床座亦得雙用然於本事行時多有不便隨處量法二衆具者律中舍羅燈火水瓶坐具等年少比丘先須辨之華香莊嚴準前早辨三於説戒日上座白僧令知今時維那打靜告白言大德僧聽今黑月十四日衆僧和合某時某處説戒布薩餘如衆網中四鳴鐘集僧不局沙彌並須入堂若沙彌有緣依法與欲後須籌數若猶有聞疑之相盡界求覓喚之若無有相依法而作沙彌大僧二處各説戒者鳴鐘之時各集二處應説聞鐘偈增一阿含云降伏魔力怨除結盡無餘露地擊犍稚比丘聞當集諸欲聞法人度流生死海聞此妙響音盡當雲集此次入堂時便合掌恭攝致禮説偈言持戒清淨如滿月身口皎潔無瑕穢大衆和合無違諍爾乃可得同布薩説已各依位隨次而坐如上五分恭敬具儀此是極教所遺攝僧根本之教不比尋常諸餘法事五明供具若有沙彌淨人教令摘華香水槃檠鉢貯五器三器共華槃交錯羅列堂中若在冬時或無華月當具綵華以物席地像中布設并香爐籌案高座衆具並令嚴正使有可觀六明維那行事應年少比丘三五人助辨所須各具修威儀維那取香水及湯次第洗手已持水湯至上座前互跪盥上座掌已取籌浴之各説偈言羅漢聖僧集凡夫衆和合香湯浴淨籌布薩度衆生若上座老年或不解時事者維那自浴籌已餘有淨水香湯隨多隨少各取行之令一年少比丘將水行之各説偈言八功德水淨諸塵盥掌去垢心無染執持禁戒無缺犯一切衆生亦如是依安師古法應左手執手巾上右手持下行之維那執籌唱白者令餘人行之及香湯淨巾亦爾又令一人持香湯行之各説偈言香水熏沐澡諸垢法身具足五分充般若圓照解脫滿群生同會法界融此之二偈各至座前説之不得一時也又水湯二物但得盥掌本無漱口之事往往有之自出愚叟其維那浴籌已至上座前打靜處立左手捉籌右手捉打靜椎其柄亦須香水淨已打靜法如雜品中當舉手打一下告云大德僧聽衆中誰小小者收護三説收謂收攝衆具護謂監護法事也有云并供養收籌者準上文中已具又打一下唱云大德僧聽外有清淨大沙門入三説之有解云大沙門者賓頭盧也準律恐不集者更相撿挍故作法命之不局賢聖有云前加一白未受具者出等四分説戒不得妄驅沙彌以戒本説戒人自唱令出若依僧祇三律維那在前唱出故彼戒本云説戒者言未受戒者已出等若高座誦外宗戒本維那依前唱出不須道及不清淨者出以言中所囑事在高座序中或自發露便應説戒如是唱訖又打靜云大德僧聽此衆小者已收護未受具已出誦四分戒本不須此言外清淨大沙門已入內外寂靜無諸難事堪可行籌廣作布薩我某甲比丘為僧行籌作布薩事僧當一心念作布薩願上中下座各次第如法受籌三説已云并受囑授人籌便來至上座前互跪授之上座即偏袒互跪合掌諸僧一時隨上座儀式上座説偈言金剛無礙解脫籌難得難遇如今果我今頂戴歡喜受一切衆生亦如是説已受取兩手擎而頂戴之或可受已頂戴説偈彼後收籌者至上座前亦同威儀當還籌時復説偈言具足清淨受此籌具足清淨還此籌堅固喜捨無缺犯一切衆生亦如是便還他籌不得復座待供養已如是展轉乃至大僧訖收籌者來至上座所授之上座取已便數知之維那後來打靜一下云次行沙彌籌三説已有沙彌者徑往坐所行之并取囑授者乃至僧中一遍通告云沙彌籌或有大僧將欲來者如是收已依前付數維那復至上座所互跪取數時上座當告云僧有若干沙彌若干都合若干維那即起打靜云大德僧聽此一住處一布薩大僧若干沙彌若干都合若干人各於佛法中清淨出家和合布薩上順佛教中報四恩下為含識各誦經中清淨妙偈僧祇説云清淨如滿月清淨得布薩身口業清淨爾乃應布薩若沙彌別處説戒如後別法七明請説戒師佛令上座説戒縱前已別差終須前請應至上座前具修威儀已合掌白言大德慈悲為僧説戒若堪説者此説戒事正當我作便即唱之若不堪者云但此説戒任當某甲但為老病言辭濁鈍恐惱衆僧令次座説即至次座亦如前請若辭不説者應至上座云次座亦辭不堪上座先預知有誦利者應語維那至某甲所云僧差説戒彼至前所具述已還至打靜處陳告之若次座不堪不須次第問下準上僧祇但得次座也彼應告僧言大德僧聽僧差律師某甲為僧誦律梵音某甲律師升高座彼應具儀至僧中四面禮僧已互跪白言小比丘某甲稽首和南敬白衆僧僧差誦律恐有錯誤願同誦者指授白已一禮升座八明供養説戒法若有高座最善無者在聖僧座上抽聖僧座在下彼説戒者坐已維那打靜水者供養梵唄作之若準律文唄匿如法出要律儀云如此鬱鞞國語翻為止斷也又云止息由是外緣已止已斷爾時寂靜任為法事也彼三五年少比丘持香水僧前左右灑水留中空處擬行來也香湯及華亦同水法散灑已餘有中央當持水華合著一槃總從一頭却行布散使及兩邊空器復本處使人復座當散華時各説偈云華嚴經云散華莊嚴淨光明莊嚴寶華以為帳散衆寶華遍十方供養一切諸如來彼供養者待散華已然後作禮三捻香已執爐向上座所坐方互跪炷香爐中維那云行香説偈此法安師每有僧集人別供養後見繁久令一人代衆為之廣如本文各説偈言華嚴云戒香定香解脫香光明雲臺遍法界供養十方無量佛見聞普熏證寂滅維那打靜訖供養者復座維那仍本位九明問答法彼當準上誦之至未受具戒者出諸沙彌等隨次而出儀式如別法中不來者説欲如前欲法若無者維那互跪答云無説欲者又云誰遣比丘尼來請教誡彼受尼囑者起至僧中禮已互跪合掌言如五分法云大德僧聽某寺尼衆和合僧差比丘尼某甲半月半月頂禮大德僧足求請教誡尼人三説已至上座前長跪曲身合掌云大德慈悲能教授比丘尼不答云年老無德乃至二十夏來並須委問不過下座以無別德可明若無者還至上座前云遍問年德並辭不堪上座云諸大德等何啻堪任持由惜自業故辭請耳若明日尼來請可不當依五分云此無教誡尼人又無善説法者雖然上座有教敕尼衆僧祇云當勤精進如法修道謹慎莫放逸上且出一兩律文示相貼合餘者並有明據不具出之讀此一部之文上下方練彼受囑者復本座尼明日來依命傳告若廣説法時希故略説戒者云僧今和合何所作為維那互跪答云説戒羯磨不得云布薩説戒以言通用不了彼此維那復本座已然後羯磨作白不得未至座所便作以坐立不同即是別衆此事往往有之上座不教致令僧衆俱同非法然處衆首是非須知不得低頭合眼不知法網示一律儀永成常準故僧祇中説戒説法並有上座法云云十明説戒竟法若至略教已當更鳴鐘令沙彌集然後誦明人能護戒等若總説已作神仙五通人偈梵後作處世界唄為令説者從容具儀辭遜之暇其説序前唄亦誦律序以為唄辭説者辭云小比丘某甲致敬衆僧足下敬謝衆僧僧差誦律三業不勤多有忘失願僧慈悲施以歡喜衆僧各各説自慶偈云諸佛出世第一快聞法奉行安隱快大衆和合寂滅快衆生離苦安樂快便作禮散就中雜相若界外來者徑至説處若未誦序清淨已來依次而坐不告清淨若已説清淨已後方來者戒師見來即須止住不肯住者訶令住之待坐互跪一人告云大德僧聽某甲比丘若干人等並是清淨若有犯過依過陳之為逼説戒後如法懺便依次為説若外界比丘若多若等縱説戒竟皆令重説不者如法治毗尼母云若犯七聚不淨人前應止不説戒即律文云犯者不得聞戒不得向犯者説等若三寺五寺尼請教授隨意受之總前各列寺號尼名後便總結請意若誦中恐誤當告比近人示令不得大衆同教致增混亂也四分若説戒日無能誦者當如布薩法行籌告白差一人説法誦經餘諸教誡誦遺教亦得若全不解者律云下至一偈諸惡莫作諸善奉行自淨其意是諸佛教解此偈文具如阿含中説如是作已不得不説若不解者云謹慎莫放逸便散並是佛之囑纍深有來致令正法久住而世有住寺輕此教網故違不説染污淨識漸於大法無有滋味是則出家無有利益口言佛是我師師教拒違故是外道弟子也若有犯重罪不預聞戒縱在寺內別衆則無若經懺悔來不隨意僧殘已下依教懺訖得聞如律所顯若座上憶得莫問疑識對衆發露恐大衆鬧亂者但心念口言自陳云我某甲犯某罪為逼説戒待竟當懺便得聞戒若於罪有疑亦準此陳露四明略説雜法者四分云若有八難王賊水火病人非人惡蟲人難者明了論云有人欲執縛比丘也餘緣者若大衆集床座少若衆多病若座上覆蓋不周或天雨若布薩多夜已久謂懺罪人多經久也或鬪諍事或論毗曇毗尼或説法夜已久聽一切衆未起明相未出應略説戒十誦云共伴行若住廣説小住略説不住三語説在白衣前不得口言心念云今日布薩説戒乃至宿處有命梵等難龍鬼之怖皆不得出聲心念口言今日説戒五分貴人惡獸地有生草棘刺蛇窟暗夜地有泥坐迮僧祇若逼暮天陰風雨老病不堪久坐住處遠皆開略説十誦聽在諸王前説令心清淨除大臣兵吏遣去五分説戒時賊來應連聲誦經莫令有絶若有一方衆主綱維徒衆者每至盛夏嚴冬準前略説至時小食上應告僧云今説戒日十方賢聖所共同遵並願衆僧同時集會乃知冬熱當為略説勿事他緣自生厭法僧祇律第三十四卷廣立布薩上座法五分云不應以小事囑授應在顯露處説第二明略法略有二種一者略取謂取諸八篇題首二者略却謂隨篇種類説戒師當量事緩急觀時進不緩則為廣三十九十略其餘者急則為説序已餘隨略之説前方便如廣説法至序竟問清淨已應言諸大德是四波羅夷法僧常聞乃至諸大德是衆學法僧常聞一一各題通結七滅諍下如法廣説至末文也四分文中不了但言餘者僧常聞今準毗尼母論説也若難緣卒至説序已云餘者僧常聞若不得説序云今十五日布薩時各正身口意莫放逸已便隨意去上來就緣而説增減準前一事有違並結正罪比人行事者云已説三十法僧常聞既言已説則對衆妄語並可準前或有略緣止而不説並通治罪故須明之次明一人已上別法律云若獨住者詣説戒堂掃治具調度待客比丘來若四人已上白説戒若三人各各修儀更互説云二大德一心念今僧十五日説戒我某甲清淨三説若二人相向彼此如上三説若一人心念口言今僧十五日説戒我某甲清淨三説若獨行山野聚落無人亦同此法若有罪者不應淨法小罪責心已便説若有重吉羅已上有疑及識或云發露或云待人律無明斷今準通解云須發露云今日衆僧説戒我犯某罪不應説戒布薩三説五百問云一比丘住處有界至布薩日先向四方僧懺悔三説已獨坐廣誦戒本安居策修篇第十一受曰法附夫靜處思微道之正軌理須假日追功策進心行隨緣託處志唯尚益不許駝散亂道妨業故律通制三時意存據道文偏約夏月情在三過一無事遊行妨修出業二損傷物命違慈實深三所為既非故招世謗以斯之過教興在茲然諸義不無指歸護命故夏中方尺之地悉並有蟲即正法念經云夏中除大小便餘則加趺而坐故知護命為重佛深制之必反聖言罪在不請結業自纏永流苦海極誡如此依文敬之初中分五一安居緣二分房法三作法不同四夏內遇緣成不五迦提五利解界是非初中分三一處有是非二結時不同三夏閏延促初中四分不得在樹上若樹下起不礙頭枝葉足蔭一坐如是乃至小屋山窟中坐趣容膝足障水雨若依牧牛人壓油人船上人斫材人依聚落等並成若依牧牛人已下五處者若安居中移徙隨所去處應去文中不了五分云諸依如上人者先謂作住意得依安居中間匆去隨信樂衣食豐足處去不言失夏若在無護處劫賊冢間鬼神處毒蟲窟露地若有命梵二難並不成安居明了論五種成安一處所有覆二夏初十六日謂為成前後安居日故三若東方已赤謂十五日夜分盡則東方赤者是十六日限為破十誦疏家要令十五日及界宿故四若在別住起安居心疏云別住是布薩界安居心三種一為自行二為利他三為料理三寶修治房舍一腳踏界起安居心即成五在處無五過一太遠聚落求須難得二太近城市妨修道業三多蚊蟻難或噆齧人踐傷彼命四無可依人其人具五德謂未聞令聞已聞令清淨能為決疑能令通達除邪見得正見五無施主施飲食湯藥無此五過乃可安居四分摩得伽中大同此論十誦云無人深山可畏處不須住五分云若在無救處必知無妨害亦開欲安居時先思量有難無難無難應住毗尼母第六卷中大明安居方便法用文廣不録乃至安居上座於一切僧集時食時粥時槳時應白言爾許時已過餘有爾許時在若行此等行法者是名僧父母亦名僧師云云二結時前後由夏中壞行義多招譏復重故文云自今已去聽三月夏安居春冬過少必無事不依同結吉羅問何為但結三月者一生死待形必假資養故結前三月開後一月為成供身衣服故二若四月盡結則四月十六日得成若有差脫便不得結教法太急用難常準故如來順物始從十六日至後十六日開其一月續結令成上總三時分別今但就夏亦有三時初四月十六日是前安居十七日已去至五月十五日名中安居五月十六日名後安居故律中有三種安居謂前中後也前安居者住前三月後安居者住後三月雖不云中三月然文中具明前後日數中間不辨於理自明結文各別如後法中因泛明前後一賞罰前後四月十六日是前十七日已去結者並不得五利故名罰也二得罪前後五月十五日已前名前以有緣如法不結無犯無緣吉羅十六日者緣與無緣皆結一罪唯除難事尼同僧犯唯有墮別三難事先後五百問云從夏初日有難事不得結而不出本界至後夏來並名前坐是名三十日安居同至七月十五日受歲若五月十六日安居唯得一日結後七月半已有難者可隨無難日自恣是名一日安居三受日受歲三夏閏延促者依閏安居無有正文比於薩婆多云夏中有閏受雨衣得百二十日彼衣開法尚依夏閏而受夏是制教理宜通護又本結安居要心三月不出今夏未滿閏中出界即非相續而滿是以破也若不依閏者數滿九十日便自恣摩得伽云安居已王作閏月數安居日滿自恣已受迦絺那衣即此衣成受不成受謂依閏不依閏既二文兼具至時隨緣夏初要心取閏不得依伽論若反前者通二論兩文問受一月日得攝閏六十日不答不得以安居策修靜住有益受日出界亂業曲開非是正修限依一月不得過法問五事賞勞得攝五月一月舍閏二六不答十誦不開由是開奢法故今約閏月結之進不三例若閏五月六月定百二十日住若閏四月者從四月十六日至閏月一日結者並四月住若閏月二日已後結者漸漸轉少以越閏月過取五月一日實夏成正結故若五月一日後結者皆三月住以數滿九十日故三若閏七月者從四月十六日後五月一日結者盡三月住由未至閏故五月二日已後結者皆四月住由九十日未滿入閏月不成數故餘如疏鈔二明分房舍臥具法四分因客僧受房得不好者嫌責佛令客僧欲安居者自往看房舍臥具已然後分之白二差一人具不愛等五法知可分不可分五德已羯磨言大德僧聽若僧時到僧忍聽僧差比丘某甲分房舍臥具白如是大德僧聽僧差比丘某甲分房舍臥具誰諸長老忍僧差比丘某甲分房舍臥具者默然誰不忍者説僧已忍差比丘某甲分房舍臥具竟僧忍默然故是事如是持彼比丘得法已起禮僧足白云一切僧各將衣物集堂不得使住處有餘物衆僧一時房內各將道具赴集訖彼知事人依律數房舍臥具何者好惡何者經營房主先問經營者欲住何處房已後便數知僧數至上座前白言大德上座有如是房舍臥具隨意所樂便取先與第一上座房次與第二第三乃至下座若有餘者從上座更分復有餘者更如上分故多者開客比丘住處若惡比丘來不應與時有得缺壞房不受佛言隨力修治之問僧食上下平等房舍不爾隨上座選者答食可平融一味義通十方房舍臥具事有好惡兼復美好不同限日非促故任上座而選問若爾利養等物何制相參不見者擲籌答此現前等分通有一分故制參亂投策而取僧祇不得與沙彌房若師言但與我自為料理者得若房多者一人與兩口已不得不受語云不為受用故與為治事故與若春冬付房具通二與若上座來隨次第住若安居付房已上座來不應與若當令餘處住四分安居竟客來不應移若分房舍不得分衆集處若有別房好窟當於夏前書知名字坐夏訖便滅名而去三明作法不同分二一設教對緣二用法分齊初中律列四種初對首者此通諸界今且就伽藍加法當對一比丘具儀云大德一心念我比丘某甲依某僧伽藍前三月夏安居房舍破修治故三説五分彼人告云知莫放逸答言受持義加依誰持律者答云依某律師告云有疑當往問若依聚落林野等改前伽藍住處隨名牒入料理修治隨事有無不同昔愚皇帝聚落也問依寺所以料理資具者答修治僧房用通三世前人料理得今受用今復修理以補將來若闕不修三世不續問持律五種定須何者答四分云春冬制依四種一謂誦戒至三十二至九十三誦比丘戒本四二部戒本夏中多緣故須善通塞也制依第五謂廣誦二部律所以須者五分云有比丘自不知律又不依持律安居夏中生疑又無問處乃至佛言往持律處安居若房舍迮者聽近持律師七日得往反處於中安居心念遙依有疑往問若已結前夏遇緣破者隨日結成四分云比丘夏中不依第五律師得波逸提春冬不依突吉羅中安居法律有名無法世中通用後安居法然律列三時分明三名顯別準義三法不無既明前後中間例準如鉢量制上下定中間不顯而知應云我某甲比丘依某巖中三月夏安居三説必用舊法理亦應成後安居者於五月十六日同前所對之法唯改前置後之一字二明心念者律中無所依人可白佛令心念當具儀至靈廟前發願乞安隱修道等心念口言我某甲依某僧坊前三月夏安居房舍破修治故三説住處多種準前對首若中若後亦隨二改三明忘成謂先要期此界今從外來與本心境相應雖忘開成律云忘不心念者若為安居故來便成安居故知住人不入開例由本無心必若有要理在通限外來為事不為修安雖忘不開以非為安故來也四明及界與園一腳入內明相即出佛開為安來者成餘廣如疏二明用法分齊上四安居法約時通三位約處通二界約人通五衆十誦佛制五衆安居乃至沙彌尼等四分亦爾約法者對首心念始終三十一日結有閏六十一日忘成及界人云唯得前後二日中間二十九日不得用以初二法容預而作故月一日結之後二曲開畏失前後故局一日中間之日已不及前何畏失後故不開也又云唯在後夏一日以佛開成有益若不結者一夏便失餘隨憶作法以時容預並非聖言以意用也四夏中遇緣失不者初明有難移夏後受日逢難初中四分云二難梵行者本時婦大童女淫女黃門伏藏皆因人來欲誘調比丘恐為淨行留難二者鬼神惡賊毒蟲惡獸不得如意飲食醫藥及隨意使人我若住此必為我命作留難佛言聽去準此結成者從初去日即須勤覓安身處若未得已來雖經宿不破夏以非輕心故反前不覓即破安居若得住處夏法隨身亦不得無緣出界便破夏也結成後去本界無難亦不得反來由已結夏成故須有緣及法也五分食不足父母親戚苦樂等若住恐失道意聽破安居十誦善見若安居中有緣移去無罪不言得夏四分亦爾明了論夏中有八難棄去無犯疏云人難者親情及知識等誘引罷道或作惡也梵行者乃至住處多有博易往還恐犯重罪不云得夏並云得去摩夷云移夏不破安居四分衣法中二處安居二處隨半受衣十誦僧祇命梵二難移夏二處安居乃至自恣處取衣破安居人不得衣分準此無夏不成受衣有受理應得夏問遇緣出界忘不受日經宿破夏不答諸部無文五百問云夏中忘不受七日出界行憶即悔者得一坐中不得過三悔過三悔不成歲悔謂苦憶悔本忘心即應反界問因事出界水陸道斷等難不得反界失歲不答律部無文昔高齊十統諸律師共評並云得夏問界外宿明相欲出得會夏不答準僧祇衣界準得必須入頭手足等於界內若外立不得若依大界安居戒場及餘小界等入中明相出破夏若依大界外伽藍者通往彼此二界不失謂結夏在前結界在後者若依大界內伽藍者出門破夏小界亦爾若相本通依大界不知二界相別者隨本行處不失皆謂與本心相違故義張兩失並緩依法界急隨房處而不得越界分齊四分云若前後安居見有二難當白檀越求移去若聽不聽俱應自去破僧和僧律開去也事移去若聽不聽俱應自去破僧和僧律開去也事希故不出二明得法有緣不來四分受七日出界為父母兄弟姊妹本二私通等至意留之過日不來得歲若鬼神等水陸道斷盜賊虎狼諸難同前得成準此難靜即還反界因即停止破夏僧祇夏中受日和僧道行不得迂回直道而去至彼中前和了中後即還若停住者準即破夏五明迦提利法因明解結界法初中若四月十六日結者至七月十五日夜分盡訖名夏竟至明相出十六日後至八月十五日已來名迦提月明了論云本言迦絺那為存略故但云迦提此翻為功德以坐夏有功五利賞德也廣如自恣後法次明夏中解界法人解有言破夏者以佛令夏竟解結也此妄引聖言律云安居竟應解界結界者為諸界同受功德衣也各捨通結同受共解別結廣文如十誦又疏中亦明本非為夏進不古人云安居不竟解界破夏者亦可安居不竟自恣破夏文兼二會須兩相通若夏內解界今言無妨但結夏情限不同故須分別若本依大界安居後解更結大者無難依本處有難準僧祇開之若本依自然後結作法若狹還依本若寬同前二緣二明受日法夏中有緣故聽受日必準聖言依法加受妄自誑心受而破夏虛損信施可悲之甚故委示焉就中分三一心念二對首三衆法總分三別一通料簡二緣是非三依位解初中三種受日有四不同一對人不同七日非僧別人邊成半月一月非別人法唯僧得成若互不得十誦問何處受七日佛言界內從誰受從五衆受二對界者七日通二界羯磨局作法可知三先後者若用羯磨受後更受七日得成隨緣長短不同古法唯前七日後方羯磨問先得羯磨後隨緣七日者何故羯磨云受過七日答此言過者道羯磨是過七日家法非謂言已用七日竟言過也四明相攝若受七日用竟羯磨受者隨得若七日未用或用未盡更有異緣或是七日過緣更受半月者前法即謝由羯磨法強攝故不得一身二法相續用也律云不及七日還聽受十五日今七日法在己必有餘緣故知前法壞也若前羯磨受日要須用盡方得受七日比多有之謂受一月不足更請七日相貼滿三十七日用之良不可也二對緣進不就中分八初定緣是非者凡受日緣務要是三寶請喚生善滅惡者聽往若請喚為利三寶非法破戒有難雖受不成妄數為夏計為年德受利養隨有結罪善見云自長己夏受施犯重若為私己衣鉢藥草如法悉成若為治生覓利販賣生口牛畜等物縱為三寶並破夏得罪五百問云治生破戒得財造佛得福不答尚不免地獄何況得福薩婆多云治生造佛不應禮拜等廣如後文就緣分五一三寶境界緣僧祇中為塔事四分中佛法僧事五分亦爾準此若為大寺諸處緣者開之若自受他雇畫造像寫經及自經營佛像或為俗人縱為僧家佛事非法乞求並是邪命破戒不成得罪二道俗病患生善滅惡為益彼而無為利四分中受戒懺悔布施等聽去十誦問為誰受七夜佛言為七衆興福設供懺悔受戒問疑請法有病遭難但使前見便生善滅惡應去若遣使不遣使俱得受之若中路聞死反戒八難起不應去三父母大臣信樂不信樂俱聽律文如此餘泛俗人生福信樂聽去無信不聽必有力生信義應開往四為求衣鉢乃至藥草若自病重不堪受日聽直去不須受之如上安居命難中説今時有人為衣藥等多妄請日準過知足戒失三受三尚結捨墮今則長財豐足而缺三衣此乃捨制取聽未隨佛化必長財資具俱乏準奪衣戒直爾外乞藥草等物亦謂自貧住處及即日往反處無者聽若反上得辨非緣不成五為和僧護法四分中有同界安居因我故鬪外界僧尼鬪諍須我和滅聽直去然和滅之相難知約緣而受不傷大理律無正斷故上五緣中律云不應專為飲食故除餘因緣衣鉢藥草等是也今有夏中多為乞麥妄言為衣鉢縱為而乞律結正罪或曲命別情令他請召皆不成也律中諸請一一遣信別請若父母餘人同十誦中並不為己利故也二對事離合但使前是應法之緣隨為多少得合受日如懺僧殘多罪同法則文中具銜應云今請七日法出界外為檀越請并佛事僧事等還此安居也三懸受者若所為緣現牒事為受必無實事虛構成緣或倚傍昔言倣像未實輒便乞法不成得罪由事虛限濫日數妄置法不相授故四互用謂為佛受七日夜用三日更有法事便通餘用故不得也必有本緣何爽通用十誦中白餘殘夜用謂同是一事未了殘夜白用非謂異事若本並因三寶事受隨所互用並得以俱有法故若三寶事後生不是前緣三寶及他雜緣並不開之由本無心為受故乃至為張家施物受日後受施訖留受戒者亦不應住以無法故若一家通緣準心應得問此界內僧為別處三寶病人受日得不答彌是生善故得問僧次請者得受日不答律制二請亦得通受問得受他捨請受日不答僧次應得別請不合以非施主元心故五重受者昔解一夏之中開於三法差此不成今云得重廣有徵難如疏述也但事緣如法無問多少一切通開必是犯戒緣者一受不合故律列二十餘緣但云佛未聽我如是事去不言不得重去且約為事信樂父母則有四重況餘雜請頓便限局五分若有請無請須出界外一切聽受七日十誦中列多七夜緣已文云若自為身若為他身若不遣使若遣使應去聽一七夜不聽二七夜謂一時雙牒二七日前後重用若準和僧似一事上不許重受然彼有不請之文寬於四分重受不開文非明了理須通明五百問云受七日行不滿七日還本界後更行不須更受滿七日已乃復重受明了論中得受疏解云前請七日事了還至界內第八日更請七日出界宿此論真諦三藏翻中國親承此事寧得自執一隅小見通壅三千佛化乎余親聞見中國翻經三藏及中國來者云佛滅度來無有立一夏三度受日法隨事如法並開餘廣如疏鈔六約事長短縱令前事唯止一日二日皆須七日法律云不及即日還聽受七日去夏末一日在亦作七日法立法楷定作法應爾若路近得還由緣經宿亦須受日七僧尼不同四分尼律中開受七日不云多僧祇尼無羯磨受日法若塔事僧事遊行者受七日去比有濫同僧法者但令緣至三法受日四分無文僧祇明斷足是指歸不勞別解所以不同者尼是女弱不假多遊入俗外化生善義少但開七日亦濟別緣八事訖不來成不者由所牒緣謝法亦無施便失法也即須反界不反破夏明了論云請七日出界訖事竟不還破安居得小罪十誦明文不許往僧祇意亦同之三正加法前明心念法十誦五種人謂獨住等心念受日若界中有人堪來不待心念不成若待不得界又無人具儀心生口言我某甲比丘今受七日法出界外為其事故還來此中安居三説此謂無比丘開心念若有沙彌者作念已告以事緣今請七日出界若了即還汝知之十誦令五衆受日五衆邊受準此當衆相共作之無者準前言造其沙彌受日如下別法二對首受法應具儀對比丘言大德一心念我某甲比丘今受七日法出界外為某事故還來此中安居三説然心念對首二法諸部無文但開受法相傳準羯磨白文雖非佛説義準無失若受七日未用過七日用亦得以本緣在故若無法謝不同七日藥彼已限滿病轉故失若爾病住法應在答由佛制定如論云服之七日堅病得消問此請七日得兼夜不答不得以文云至第七日當還不同十誦彼以文中受七夜故又不得改云七夜以部別不同亦不得秉四分羯磨用僧祇事訖具如諸部別行法中三明衆法所為之緣同前通用但令事是半月一月緣者方應羯磨不同存單之人由不重受七日事緣要必須訃理無停止遂引七日令長用一月羯磨此自污心教有明罰餘同前釋今加法中有四不同二家羯磨文相少見第三光師所撰羯磨增加乞辭舉世同行事須略述今正學宗並依律本恐輒內乞辭增加羯磨律云如白羯磨法作今既不如即知非教又諸部並無乞文不得準著止可隨其綱網順教誦之問用舊羯磨受日得夏不答應成歲雖增加乞辭而羯磨太宗無失第四人依律出文云大德僧聽若僧時到僧忍聽比丘某甲受過七日法十五日出界外為某事故還來此中安居白如是大德僧聽比丘某甲受過七日法十五日出界外為某事故還來此中安居誰諸長老忍僧聽比丘某甲受過七日法十五日出界外為某事故還來此中安居者默然誰不忍者説僧已忍聽比丘某甲受過七日法十五日出界外為某事故還來此中安居竟僧忍默然故是事如是持其一月日法準前著之不得雙誦十五日者三料簡雜相若夏中熱極受日者多同緣受者二人三人應一時羯磨十誦開之若依大界安居戒場及餘小界內不成受日以非本要心處故若先無大界依伽藍結者若後結二界隨界受日並成莫非所要地故縱入戒場不破夏而離衣若本結大界小於伽藍便依伽藍而坐者由佛制依界故有者不成受日不得止得却縮取於界相餘廣如疏上是義決非文有之自恣宗要篇第十二迦絺那衣法附然九旬修道精練身心人多迷己不自見過理宜仰憑清衆垂慈誨示縱宜己罪恣僧舉過內彰無私隱外顯有瑕疵身口託於他人故曰自恣故摩得伽云何故令自恣使諸比丘不孤獨故各各憶罪發露悔過故以苦言調伏得清淨故自意喜悅無罪故也所以制在夏未者若論夏初創集將同期欵九旬立要齊修出離若逆相舉發恐成怨諍遞相訟及廢道亂業故制在夏未者以三月策修同住進業時竟云別各隨方詣必有惡業自不獨宣障道過深義無覆隱故須請誨良有茲焉故律聽安居竟自恣毗尼母云九十日中堅持戒律及修諸善皆不毀失行成皎潔故安居竟自恣此是自言恣他舉罪非謂自恣為惡此雖相顯有無知者濫行就中分三一明緣集相應二自恣方法三雜明諸行初中分二前明時節謂有閏月者依閏安居七月十五日自恣不依閏者依摩得伽中數滿九十日自恣若閏七月者取前月自恣非前夏安居者過閏已數滿九十日自恣二因諍增減自恣如説戒中三修道安樂延日自恣得至八月十五日然律中但明十四日十五日自恣及至急施衣中次第增中十六日自恣增三中三日自恣律云安居竟自恣則七月十六日為定律又云僧十四日自恣尼十五日自恣此謂相依問罪故制異日及論作法三日通用克定一期十六日定若有難者如五百問中一月自恣二明應人是非若破夏不安居人雖不得歲以舉罪義通理必依衆恣僧治舉四分云若後安居人從前安居者自恣住待日足二明自恣方法分三即三人也就五人已上分四一明僧集緣起二五德自恣進不三尼來請罪四雜明略説諸事初中要五僧已上得白差自恣當鳴鐘集僧各在地上敷席而坐以是互相舉過處床慢相不絶故律云不得在座不得在地應離座自恣五分云好泥地布草座已而自恣並偏袒右肩右膝著地合掌初行水香汁浴籌唱數告令大同説戒唯改説戒為自恣之辭乃至沙彌等亦須集堂以治舉義同待唱出已方始得去在別處行自恣法如別法明二五德進不分二初六人已上法後五人法初中分四一簡人是非二差法正式三五德行事四對座説之儀式初中四分律取具二五法者謂不愛恚怖癡知自恣不自恣此名自恣五德律文又差知時不以非時如實不以虛妄利益不以損減柔耎不以麁獷慈心不以瞋恚此謂舉罪五德意令和合無諍有罪非謬欲使前人懺悔清淨美德外彰故能勸喻離於懷惱愍物與樂不欲非法故所以差二人者四分文不了十誦僧祇中並差二人為法五分中二人已上乃至多人謂僧多故更互息作三千威儀云要差二人為僧自恣竟自相向出罪不得求餘人自恣以餘人僧不差故今行事者多有人人別差此未通諸部又差年少輕揵者多不生善十誦僧祇多差上座有德者令下座來向上座自恣也二加法差遣者當上座差衆中二人具兩種五德者不須喚來立前而作此是別衆往往而然直在本座而坐作羯磨者索欲問和其欲法云大德僧聽比丘某甲我受彼欲自恣彼如法僧事與欲自恣此律自恣開欲不同他部故重示之作者知之問和答云自恣羯磨亦有通別如上應云大德僧聽若僧時到僧忍聽僧差比丘某甲某甲作受自恣人白如是大德僧聽僧差比丘某甲某甲作受自恣人誰諸長老忍僧差比丘某甲某甲作受自恣人者點然誰不忍者説僧已忍差比丘某甲某甲作受自恣人竟僧忍默然故是事如是持三五德行事法差已即從座起具儀至上座前露地伸手內作和白言大德僧聽今日衆僧自恣若僧時到僧忍聽和合自恣白如是不應立作別衆不成若差自恣人時答云差受自恣人羯磨者不得通用後法至五德單白前和答言單白和僧自恣羯磨若如前答直爾通和二法次明行草法四分但云離座不言草座五分布草而坐明文依用當於自恣前預覓乾耎草隨得多少人別一剪安上座前至五德和已令年少次第行之彼至上座前互跪授已乃至下座大衆多者三五人助行之各取已於座前敷之若大德衆主為敷亦得計是前辨不止臨時五德至上座前互跪告云一切僧就草座偏袒右肩互跪合掌依皆僧唱從之四明對僧自恣法增一云如來同僧坐於草座告諸比丘汝等各就草座我欲受歲等廣如新歲經中次正對僧自恣法其一五德至上座前大敷坐具互跪第二五德至次座前立此僧祇文四分云若上座見五德來即從座起互跪偏袒右肩合掌一切僧即隨上座法十誦云五德是上座者應加捉足之言應作法言太德一心念衆僧今日自恣我比丘某甲亦自恣若見聞疑罪大德長老哀愍故語我我若見罪當如法懺悔三説上座復本座其五德至第三上座前立彼第二五德在次座前立者同上作法如是展轉至于下座隨其説訖還復本座律開病者隨身所安準此不病應訖自恣若二五德自恣者僧祇五德各至本坐處應自恣不得待僧竟然後自恣即破十誦家法若衆僧説已五德至上座前告云僧一心自恣竟便如常禮退十誦文也若五德及僧舉得六聚之罪或自言伏首僧當撿挍審實者各依當篇治竟然後自恣若別人舉罪窮勘是非核其事情無有虛濫者依律遮法治之若事實是犯舉根不了並反治謗罪亦如衆網中五德舉過無問虛實由是僧差加復具德縱舉成虛三根容謬雖合推繩情在離惡故不入治限不同別人僧不差遣輒爾陳過恐濫清人又內無德多不知時反生諍本何成安衆故虛即結謗若僧滿二十隨所犯罪並得治之若五人已上舉得出罪之事則且白停進不如四人法中説三尼來請出過法若無尼衆來依常自恣不須同説戒問尼有無若尼來者當自恣前語令在眼見不聞處立衆僧自恣若至五三人量時早晚令尼得還者上座敕五德且住待尼自恣當命之至僧中禮足已令説三事見聞疑等如別法明大衆良久默然上座敕尼云大衆上下各並默然不云見罪者良由尼等內無缺犯外得清淨各精勤行道謹慎如法自恣至寺當傳此教告尼僧令知餘同尼法此謂白日法今時多在十四夜或十五夜自恣者若尼明日來時鳴鐘集僧不來者索欲大衆集已尼來僧中如常威儀請求三事餘同前示問此非僧法何須盡集索欲答以尼依僧住溥使舉罪若一人不和則不成自恣故律云若僧不滿若不和合則令問訊禮拜不得如廣自恣法處既有僧通須舉治無濫故須集之僧祇教誡中本無羯磨法亦令隨緣説欲訖然後教誡由是僧法理不偏別故今僧尼自恣同是僧法準用不疑五百問夏末尼來受歲若二尼已上得一尼不得以尼獨行出界犯重罪故四明略説雜行言略説者若有八難餘緣如説戒中明者當量僧多少難來遠近等若僧多時熱處所迮狹明相欲出等當令五德於三五上座邊三説已外衆僧一説便止或一人受兩人自恣者互跪須在中間左右取之並須一説示令大衆聞知律云不得竊語自恣今或兩五德雙頭一時各自恣者此是非法律中一時自恣鬧亂佛令一一次第從上座自恣十誦應從上座自恣不得逆作次第及行行置人如益食法并超越總唱等四分若賊等急難不可間緩者五德至上座前互跪白言今有難事不得一説當作羯磨各各三説文云大德僧聽若僧時到僧忍聽僧今各各共三語自恣白如是便各各相對人別三説文同前法難事轉近若欲再説一説亦須單白以此自恣不對五德進不無由故須羯磨令衆同聞不類前略不須白告以親對五德多少量時得自在故四分六種略説第六難事驚急開直爾去二明難事結小界圓坐自恣事既希少故不出之上來明六人僧法具述如上次明五人衆法恐濫行故簡異之若界內五人者索欲不開問和答已便白二差一五德竟又重差第二人不得牒二人一時同法以所為人不入僧數故取自恣時一五德同前坐一五德展轉取自恣若至坐處二人共説餘同前法二四人已下至對首法當盡界集不得受欲四人相對一人別説云諸大德一心念今日衆僧自恣我比丘某甲清淨三説餘人亦如上述之若二人對首唯云大德一心念餘辭同前若犯波逸提已下罪者莫問自言舉來並前懺已自恣若犯四人已上偷蘭僧法但入偷蘭説中乃至僧殘説中以交無治罰之義若準用十誦白停後當待衆滿如法治之不應礙自恣四分説戒中自犯罪若告僧恐妨説戒令心念發露已後得聞戒既俱是淨行衆法攝治功齊準用無妨理須牒其所犯以衆不滿未得治之餘者清淨此中口陳若不實者結罪隨犯三波逸提不同説戒默妄隨罪結告也若一人法者律云當往説戒處掃灑敷坐具盛水器舍羅等待客比丘若無來者應至塔廟前具修威儀心生口言今日衆僧自恣我比丘某甲清淨三説若犯輕突吉羅心念懺已自恣若犯故作吉羅已上無治罰義及以發露則不應自恣之法餘依前三大明雜相問對僧自恣云見罪懺悔對首心念皆云清淨者何答僧中通有治舉之義加法容得具足別人雖有治舉攝治未能得盡故但言清淨舉心應僧問自恣竟得説戒不答依明了論先説戒後自恣四分云自恣即是説戒問自恣得在未受具戒人前作不答律中令至不見不聞處作羯磨自恣若不肯避去僧自至不見聞處作之律中若別人及僧自恣已更有客來若少告清淨等多更為説若二人作法已更有三人僧法自恣二人來者還同對首如前所明問十五日自恣已得出界不答不得破夏離衣由夜分未盡故受日至七月十五日滿者亦須反界以夜不得法文云及七日還問此界安居餘處自恣得不答僧祇不得結罪問前安居人自恣竟夏分得物後安居人得不答律令受物餘日應足令滿若分房舍臥具亦聽為未來故受問一説二説自恣無難緣成不答不成律中六群比丘一説二説竊語疾疾語不往自恣處往而不坐或不説佛並判不應四分云年少比丘不知自恣法者和尚闍梨教詔猶故忘不憶使受自恣者教若復忘應共句句説年少如此委示老者云何答云亦同年少之法故律中阿難攝衆無法迦葉訶言年少阿難言我今頭白何故名年少答云汝不善察事同年少老年愚法豈不例之問界中前後安居自恣云何答云從安居多者自恣等問安居竟須離本處不答律云安居竟不去犯罪毗尼母云比丘安居已應移餘處若有緣不得去不犯若緣無者出界一宿還來不犯五分安居已不去一宿者墮若不作限請若非受請處得住增一云告諸比丘恆一處止有五非法意樂屋舍器物又著財産恐人奪之或多集財物貪著親親恆共白衣往來反此得五功德迦絺那衣法明了論翻為堅實也能感多衣衣無敗壞又名難活以貧人取活為難捨少財入此衣功德勝如以須彌大衣娶施也或云堅固或名廕覆古翻為賞善罰惡衣賞前安居人後安居不得也亦名功德衣以僧衆同受此衣便招五利功德也就中分五一受衣時節二衣體是非三簡人差別四受衣方法五捨衣進不并雜出諸相初明受衣時者四分云安居竟應受功德衣則前安居人七月十六日受至十二月十五日捨故文云齊冬四月捨如是乃至八月十五日日日亦得受衣故文云即日來不經宿者謂即得衣日即受不得經宿等故十誦云若月一日猶是七月十六日也得衣即日受若二日三日乃至八月十五日亦爾五分受有三十日捨亦三十日彼但得四月利不同四分五月利也毗尼母云七月十六日應受若事緣不及乃至八月十五日過是不得捨中亦齊五月滿已羯磨捨七月十六日受者得百五十日利八月十五日受者得百二十日利中間轉降可以比和十誦問受功德衣已官作閨月者隨安居日數取滿也則不得攝閏二明衣體四分云若得新衣若檀越施衣若糞掃衣新物揲作淨若已浣浣已納作淨即日來不經宿不以邪命得不以諂曲得不以相得不以激發得不捨墮作淨者應法四周有緣五條作十隔若過是條數應自浣染舒張碾治裁作十隔縫治又云不得大色染衣聽用袈裟色此云不正色也十誦若不割截減量作不揲四角若故爛壞覆死人衣到冢取來者四分云糞掃者則非死人衣也及曾已受作迦絺那衣並不成若揲葉衣得成摩得勒伽云死比丘受用三衣及故衣不成若急施衣時衣成受僧祇未曾受用三衣得作五分若浣染打縫不如法若小若大若錦綺衣若未自恣竟受若貪利養故捨五事皆不成反上成受善見若七衆衣得受若三衣中隨受一二得四分必須編邊安紐作鉤成受三簡人差別者先明受人後明持人四分云不在僧前受謂與欲人若有難若無僧伽梨若僧如法受衣而彼在界外住並不成善見前安居人得受若後安居破安居異界僧等不得受利若此處僧少不滿五人得預請界外僧足數成受其異界僧不得受利若住處有四比丘一沙彌安居欲竟為沙彌受大戒得足數成受新受戒者亦得五利一比丘四沙彌又爾以沙彌夏坐有功也若住處雖有五人不解受衣得請異界知法僧來作羯磨受衣異界人自不得受十誦云諸異界僧欲受衣不可得者各解本界同結受已然後別結捨者成捨不捨者依利犯僧殘人別住人學悔沙彌擯人等不成受二明持衣人十誦云守衣人具不愛等五德謂知得受不得受了了分明善見云若多人送功德衣應受一衣餘同輕物應分重物屬四方僧若施主言持三衣作盡與持衣人隨施主意若羯磨迦絺那衣與衣壞者若衣壞者多與衣壞中老者若老者多與老中夏多者不得與慳貪人明了論疏云於初結安居時欲受迦絺那衣悉須白僧我欲受衣僧觀此人不多緣事不不好失衣不此人從來不貪聚財物有慈悲心好行惠施者僧即許可若不爾者不須許之四受衣方法初作衣法後明受法四分若得未成衣應衆僧中羯磨差比丘令作若得已成者應如法受善見云若衣未成應喚一切比丘共成不得説道德作留難唯除病者不得縫作應却刺之所以殷勤者此衣諸佛所讚昔蓮華如來一萬六千比丘圍繞共作故諸部作衣大有明法今時有者多是已成故略不出二明正受應取橫疊二尺一綴如是五綴置箱中在上座前僧祇應襞疊衣置箱中衆華散上二明和僧受衣應鳴鐘集僧即簡破夏不安居人犯僧殘等如上列人並令別坐一處以不同受衣故餘合受者共坐一處雖二處別坐應同衆法即須索欲問和答云受迦絺那衣羯磨主座白言大德僧聽今日衆僧受功德衣若僧時到僧忍聽僧今和合受功德衣白如是如是白已與一比丘應問言誰能持功德衣者答某甲能持應作羯磨云大德僧聽若僧時到僧忍聽僧差比丘某甲為僧持功德衣白如是大德僧聽僧差比丘某甲為僧持功德衣誰諸長老忍僧差比丘某甲為僧持功德衣者默然誰不忍者説僧已忍差比丘某甲為僧持功德衣竟僧忍默然故是事如是持彼從座起禮僧足在上座前互跪合掌當羯磨持衣與之大德僧聽此住處僧得可分衣現前僧應分若僧時到僧忍聽僧持此衣與比丘某甲此比丘當持此衣為僧受作功德衣於此住處持白如是大德僧聽此住處僧得可分衣現前僧應分僧今持此衣與比丘某甲此比丘當持此衣為僧受作功德衣於此住處持誰諸長老忍僧持此衣與比丘某甲此比丘當持此衣為僧受作功德衣於此住處持者默然誰不忍者説僧已忍持此衣與比丘某甲受作功德衣竟僧忍默然故是事如是持彼即應起執衣箱至上座前互跪頂戴已授與上座上座亦頂戴如是三反已置箱上座前左手撥除華已右手執衣頭置左手中二尺許又取一疊如是四疊並置左手中來上座前上座見來即互跪舒手其人即右手取疊頭授與上座又却行一疊付第二上座如是却行盡第四上座彼付衣已還至第二上座下間手執衣口云此衣衆僧當受作功德衣此衣衆僧今受作功德衣此衣衆僧已受作功德衣三説彼諸比丘應作是言其受者已善受此中所有功德名稱屬我如是各各説已答言爾即應起至第四上座前右手執衣置左手中如是四攝取已至第五上座前還如第一上座法如是乃至下座已還來上座前執衣向僧互跪白云今僧和合受功德衣竟五明捨衣雜相四分中聽齊冬四月竟應出有二種捨一持功德衣比丘出界宿二衆僧和合出又廣明要心失捨法今明和合出者律云僧集和合未受戒者出不來者説欲僧今和合何所作為答云出功德衣羯磨太德僧聽今日衆僧出功德衣若僧時到僧忍聽僧今和合出功德衣白如是僧祇有多種捨法至臘月十五日不捨者至十六日自然而捨餘部八種十種各隨違本心皆成捨也次明五利通塞者律中受此衣故畜長財離衣宿背請別衆食食前食後至他家等各如隨相所明其畜長衣始從七月十六日後受得至十二月十五日一時説淨餘有時非時相攝亦如隨相説思益經云菩薩有四法無所恐畏威儀不轉一失利二惡名三毀辱四苦惱得利心不高失利心不下八法中其心平等為決定説罪福業不失
