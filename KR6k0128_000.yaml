front:
  text: 四分律刪繁補闕行事鈔序作者非無標名顯別京兆崇義寺沙門釋道宣撰述夫戒德難思冠超衆象為五乘之軌導實三寶之舟航依教建修定慧之功莫等住持佛法群籍於茲息唱自大師在世偏弘斯典爰及四依遺風無替逮于像季時轉澆訛爭鋒脣舌之間鼓論不形之事所以震嶺傳教九代聞之拔萃出類智術而已欲明揚顯行儀匡攝像教垂彝範訓末學紐既絶之玄綱樹已顛之大表者可得詳而評之豈非憑虛易以形聲軌事難為露潔者矣然則前修託於律藏指事披文而用之則在文信於實録而寄緣良有繁濫加以學非精博臆說尤多取類寡於討論生常異計斯集致令辨析釁戾輕重倍分衆網維持同異區別自非統教意之廢興考諸說之虛實者孰能闢重疑遣通纍括部執詮行相者與常恨前代諸師所流遺記止論文疏廢立問答要抄至於顯行世事方軌來蒙者百無一本時有鋭懷行事而文在義集或復多列游辭而逗機未足或單題羯磨成相莫宣依文用之不辨前事並言章碎亂未可披撿所以尋求者非積學不知領會者非精鍊莫悉余因聽采之暇顧眄群篇通非屬意俱懷優劣斐然作命直筆具舒包異部誠文括衆經隨說及西土賢聖所遺此方先德文紀搜駁同異並皆窮核長見必録以輔博知濫述必剪用成通意或繁文以顯事用或略指以類相從或文斷而以義連或徵辭而假來問如是始終交映隱顯互出并見行羯磨諸務是非導俗正儀出家雜法並皆攬為此宗之一見用濟新學之費功焉然同我則擊其大節異說則斥其文繁文繁誰所樂之良由事不獲已何者若略減取其梗概用事恆有不足必橫評不急之言於鈔便成所諱今圖度取中務兼省約救急備卒勒成三卷若思不贍於時事固有闕於行詮則略標旨趣以廣於後然一部之文義張三位上卷則攝於衆務成用有儀中卷則遵於戒體持犯立懺下卷則隨機要行託事而起並如文具委想無紊亂但境事實繁良難科擬今取物類相從者以標名首至於統其大綱恐條流未委更以十門例括方鏡曉遠詮標宗顯德篇第一集僧通局篇第二足數衆相篇第三別衆法附受欲是非篇第四通辨羯磨篇第五結界方法篇第六僧網大綱篇第七受戒緣集篇第八捨戒六念法附師資相攝篇第九說戒正儀篇第十安居策修篇第十一受日法附自恣宗要篇第十二迦絺那衣法附篇聚名報篇第十三隨戒釋相篇第十四持犯方軌篇第十五懺六聚法篇第十六二衣總別篇第十七四藥受淨篇第十八鉢器制聽篇第十九房舍五行調度衆具法附對施興治篇第二十頭陀行儀篇第二十一僧像致敬篇第二十二造立像寺法附訃請設則篇第二十三導俗化方篇第二十四主客相待篇第二十五四儀法附瞻病送終篇第二十六諸雜要行篇第二十七謂出世正業比丘所依法沙彌別法篇第二十八尼衆別行篇第二十九諸部別行篇第三十第一序教興意夫至人興世益物有方隨機設教理無虛授論云依大慈門說於毗尼故律云世尊慈念故而為說法二為對外道無法自居顯佛法人尊道高故制斯戒觀下律中凡所制者並懷異術故文云若不撰結則令外道以致餘言三為對異宗故來宗則有其多別且如薩婆多部戒本繁略指體未圓接俗楷定於時數御法例通於無準今曇無德部人法有序軌用多方提誘唯存生善立教意居顯約上則通明教興今據當宗以辨夫教不孤起必因人人既不同教亦非一故攝誘弘濟軌用實多貴在得其本詮誠難核其條緒所以約開制驗旨在為人顯持犯諒意存無過今束一律藏以五例分之則教興之意可見也一以遮性往分性惡則通於化制遮戒因過便起然則性戒文緩而義急謂隨諸重戒並有開文文雖是開開實結犯縱成持也持之實難如淫則三時無樂毀訾則始終慈救既是根本貪瞋何能禁心無逸故知義存急護也遮戒一往制止有益便開開之過興還復令制豈非為存化俗恐墜枉坑大慈設教意唯撿失故毗尼母論具立緩急二儀令尋之以通望也二以開制往徵教則通於二世故下文云以世尊是一切智人故制已更開開已還制此通未來教也如五分雖我所制於餘方不為清淨者則不應用雖非我所制於餘方必應行者不得不行此如來在世教也然二教相融互兼彼此三以報有強弱教亦重聽就制則深防限分約行則山世不同四以機悟為先教門輕重致隔五部異執豈不然耶五以事法相對法唯楷式乖旨則事不成事通情性故隨境制其得失或託三性之緣或隨世譏而起且略引諸條薄知方詣總撮包舉者莫非拯接凡庸心懷泥曰而興教矣故文云世尊何故制增戒學為調三毒故云何為學為求四果故下諸門中所述制意止隨前事令後進者尋條知本焉第二制教輕重意輕重兩意裁斷實難何者原彼能施之教教主窮機之人又推此所為之人人唯應藥之器所以藥病相扣利潤無方豈可以情斷寧復言論測也雖然重核其遠標實被於來裔在文自顯何假證成今序斯大略所謂有七一興厭漸頓二結正業科三報果不同四攝趣優劣五起情虛實六開制互立七約行彰異如誼靜二儀也凡此諸例並制教之本懷據斷之宗體第三對事約教判處意自佛法東流幾六百載諸師穿鑿判割是非競封同異不可稱說良由尋討者不識宗旨行事者昏於本趣故須學師必約經遠執教必佩真文何事被於毀譏豈復淪乎蚩責今判其持犯還約其受體體既四分而受豈得異部明隨猶恐不曉大綱更示其分齊謂輒將己所學者判他持犯脫罹愆失其唯不學愚癡今通立定格共成較準一披條領釋然大觀第四用諸部文意統明律藏本實一文但為機悟不同致令諸計嶽立所以隨其樂欲成立己宗競采大衆之文用集一家之典故有輕重異勢持犯分塗有無遞出廢興互顯今立四分為本若行事之時必須用諸部者不可不用故善見云毗尼有四法諸大德有神通者抄出令人知一本者謂一切律藏二隨本三法師語者謂佛先說本五百羅漢廣分別流通即論主也四意用謂以意方便度用及三藏等廣說也先觀根本次及句義後觀法師語與文句等者用不等者莫取第六卷中廣明律師法正文如此然行藏之務實難取捨之義非易且述其大詮以程無惑謂此宗中文義俱圓約事無缺者當部自足何假外求餘有律文不了事在廢前有義無文無文有事如斯衆例並取外宗成此一部又所引部類必取義勢相關者可用證成必緩急重輕是非條別者準論不取故文列四說令勘得失十誦墨印義亦同之若此以明則心境相照動合規猷繁略取中理何晦沒若不鏡覽諸部偏執一隅涉事事則不周挍文文無可據遂師心臆見各競是非互指為迷誠由無教若四分判文有限則事不可通行還用他部之文以成他部之事或二律之內文義雙明則無由取捨便俱出正法隨意采用然行用正教親自披閲恐傳聞濫真故也又世中持律略有六焉一唯執四分一部不用外宗如持衣說藥之例文無止但手持而已二當部缺文取外引用即用十誦持衣加藥之類三當宗有義文非明了謂狂顛足數睡聾之類四此部文義具明而是異宗所廢如捨淨地直言說戒之類五兼取五藏通會律宗如長含中不令更試外道六終窮所歸大乘至極如楞伽涅槃僧坊無煙禁斷酒肉五辛八不淨財之類此等六師各執正言無非聖旨但由通局兩見故有用解參差此鈔所宗意存第三第六餘亦參取得失隨機知時故也第五文義決通意夫理本絶名故立名標其宗極名隨事顯故對事而備斯文然考斯律藏言事並周但為年代渺邈聲彩靡追法為時移事多殘缺加以五師捃拾情見不同重由翻譯失旨妄生構立又為抄寫錯漏相承傳濫所以至於尋究紛慮良多今總會之以通其大見若文義俱闕則可舉一以例諸或就理有而成前事或在文雖具而於義有闕便以義定之故論言以理為正故也或義雖必立當部無文則統關諸部以息餘謗然文義決通誠難廢立自非深明律相善達開遮不然便有纍於自心固無益於他境故律云文義俱同文同義異文異義同文義俱異具舒進止不勞敘釋然決判是非者必總通律藏之旨并識隨經之文如上六師所明乃可究斯教迹故十誦云比丘有三事決定知毗尼相一本起二結戒三隨結應思惟觀察二部戒律并及義解毗尼增一開遮輕重如五大色是不淨遮非色淨不遮如是等籌量本末已用也明了論亦云比丘能知五相名解毗尼不看他面文略同上廣如彼說第六教所詮意詮教之文文雖浩博撮其大趣止明持犯然持犯之境境通內外內謂行心之結業外謂情事之順違但令教行相循始終無犯則為持也若生來不學於法無聞修造善惡義兼福罰今欲科罪但使與教相應不問事情虛實並名犯也此通名持犯也若結篇正罪窮諸治罰必令束其方便攬成業果使量據核其實情輕重得於理教則斷割皎然更何蕪濫此別名持犯也第七道俗七部立教通局意顯理之教乃有多途而可以情求大分為二一謂化教此則通於道俗但泛明因果識達邪正科其行業沈密而難知顯其來報明了而易述二謂行教唯局於內衆定其取捨立其網致顯於持犯決於疑滯指事曲宣文無重覽之義結罪明斷事有再科之愆然則二教循環非無相濫舉宗以判理自彰矣謂內心違順託理為宗則準化教外用施為必護身口便依行教然犯化教者但受業道一報違行教者重增聖制之罪故經云受戒者罪重不受者罪輕文廣自明所以更分者恐迷二教之宗體妄述業行之是非故立一門永用蠲別第八僧尼二部行事通塞意然二部同戒同制則事法相同行用儀式類準僧法具在諸門隨事詳用若辨成犯相者戒本自分隱而難知者具在隨相餘有約位之戒謂輕重不同有無互缺犯同緣異而是當世盛行種相難知者及別行衆行等法方列尼別行法中此但分其宗類猶未顯其來詮諸有不同之意具在大疏第九下三衆隨行異同意二衆沙彌若約戒體同大僧無作撿其本數唯顯於十就餘隨行類等塵沙結罪居第五篇就位在諸戒末自外行法不同取捨有異者各就別篇具明式叉摩那六法是其學宗戒體更不重發自餘隨行對治同諸三衆學之必有不同具如尼別法所顯第十明鈔者引用正文去濫傳真科酌意初明引用正經次明世中僞說後明鈔興本意初言正本者僧祇律是根本部餘是五部曇無德部四分律也鈔者所宗薩婆多部十誦律也彌沙塞部五分律也迦葉遺部解脫律此有戒本婆麁富羅部律本未至此依大集分別毗尼母論善見論摩得勒伽論薩婆多論并傳毗奈耶律明了論釋正量部并真諦三藏疏五百問法出要律儀梁武帝準律集自餘衆部文廣不列并大小乘經及以二論與律相應者名隨經律並具入正録如費長房開皇三寶録十五卷中次明諸師異執法聰律師覆律師出疏六卷光律師兩度出疏理隱樂三師各出抄遵統師疏八卷淵律師有疏雲暉願三師各自出抄疏洪勝二師有抄首律師有疏二十卷礪律師有疏十卷基律師有疏已外曇瑗僧祐靈裕諸師已下及江表關內河南蜀部諸餘流傳者並具披括一如義鈔次明世中僞經諸佛下生經六帙淨行優婆塞經十卷獨覺論金棺經救疾經罪福決疑經毗尼決正論優波離論普決論阿難請戒律論迦葉問論大威儀請問論五辛經寶鬘論唯識普決論初教經罪報經日輪供養經乳光經應供行經福田報應經寶印經沙彌論文殊請問要行論提謂經如是等人造經論總有五百四十餘卷代代漸出文義淺局多附世情隋朝久已焚除愚叢猶自濫用且述與律相應者如前所列餘文存略後明鈔興本意夫鈔者固令撮略正文包括諸意也余智同螢曜量實疏庸何敢輕侮猷言動成戲論雖然學有所承承必知本每所引用先加覆撿於一事之下廢立意多諸師所存情見繁廣今並刪略止存文證及教通餘論理相難知自非通解焉能究盡具如集義鈔所顯而抄略證文多不具委但取文義堪來入宗者自外不盡之文必欲尋討知其始末則非鈔者之意故文云諸比丘欲不具說文句佛言聽之毗尼母論云佛令引要言妙辭直顯其義庶令臨機有用無待訪於他人即事即行豈復疑於罪福猶恐後代加諸不急之務增益其中使真宗蕪穢行者致迷鳥鼠之喻復存於茲日矣此之十條並總束諸門例科分析若攬收不盡自下別論夫宅身佛海餐味法流形廁僧伍行唯三位若遵仰正戒識達持犯則中卷之中體相具矣自行既成外德彰用則上卷之中綱領存矣自他兩德成相多途則下卷之中毛目顯矣此三明行無行不收三卷攝文無文不委然則事類相投更難量擬若長途散釋則寡於討論必隨相曲分便過在繁碎今隨宜約略通結指歸使舉領提網毛目自整載舒載覽隨事隨依
